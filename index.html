<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#2f6690">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>The Love of My Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-deep: #2f6690;
    --sky-mid: #6aa9cf;
    --sky-soft: #bfe0f2;
    --sky-pale: #eaf6fb;
    --blush: #f6d3d6;
    --ink: #1c3a4d;
    --paper: #ffffff;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html{
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body{
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--sky-pale) 0%, var(--sky-soft) 100%);
    overflow-x: hidden;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior-y: contain;
    touch-action: pan-y;
  }

  button{
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
  }

  img{ -webkit-user-drag: none; user-select: none; }

  h1, h2, .display{
    font-family: 'Cormorant Garamond', serif;
  }

  /* ---------- Ambient floating bubbles ---------- */
  .bubbles{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bubble{
    position: absolute;
    bottom: -120px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), rgba(191,224,242,0.35));
    animation: rise linear infinite;
    opacity: 0.7;
  }
  @keyframes rise{
    0%{ transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    10%{ opacity: 0.7; }
    100%{ transform: translateY(-115vh) translateX(30px) scale(1.15); opacity: 0; }
  }

  section{
    position: relative;
    z-index: 1;
  }

  /* ---------- HERO ---------- */
  .hero{
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: max(40px, env(safe-area-inset-top)) 20px 40px;
  }

  .eyebrow{
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--sky-deep);
    font-weight: 600;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.2s;
  }

  .hero h1{
    font-size: clamp(2.6rem, 7vw, 5rem);
    font-weight: 600;
    color: var(--sky-deep);
    margin: 14px 0 8px;
    opacity: 0;
    animation: fadeUp 1.1s ease forwards 0.5s;
  }

  .hero .sub{
    font-style: italic;
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: #3f6a83;
    max-width: 520px;
    opacity: 0;
    animation: fadeUp 1.1s ease forwards 0.85s;
  }

  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(18px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .heart-wrap{
    margin-top: 46px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.2s;
  }

  .cta{
    position: relative;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--sky-mid), var(--sky-deep));
    color: #fff;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.03em;
    padding: 16px 38px;
    border-radius: 999px;
    box-shadow: 0 10px 25px rgba(47,102,144,0.35);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    animation: pulse 2.6s ease-in-out infinite;
  }
  .cta:hover{
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 14px 30px rgba(47,102,144,0.45);
  }
  .cta:active{ transform: translateY(0) scale(0.98); }

  @keyframes pulse{
    0%, 100%{ box-shadow: 0 10px 25px rgba(47,102,144,0.35); }
    50%{ box-shadow: 0 10px 34px rgba(47,102,144,0.55); }
  }

  .scroll-hint{
    margin-top: 60px;
    font-size: 0.75rem;
    color: var(--sky-deep);
    opacity: 0.7;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .scroll-hint span{
    width: 1px;
    height: 34px;
    background: var(--sky-deep);
    animation: bob 1.6s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: scaleY(1); opacity: 0.4; }
    50%{ transform: scaleY(1.3); opacity: 1; }
  }

  /* ---------- SLIDESHOW (now lives inside the note card) ---------- */
  .slideshow{
    position: relative;
    width: 100%;
    max-width: 320px;
    height: 230px;
    margin: 22px auto 0;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(47,102,144,0.28);
    border: 5px solid var(--sky-pale);
  }
  .slideshow img{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1.06);
    transition: opacity 1.4s ease, transform 6s ease;
  }
  .slideshow img.active{
    opacity: 1;
    transform: scale(1);
  }

  .dots{
    display: flex;
    gap: 8px;
    margin-top: 22px;
  }
  .dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sky-mid);
    opacity: 0.35;
    cursor: pointer;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .dot.active{
    opacity: 1;
    transform: scale(1.3);
  }

  /* ---------- LOVE NOTE PAGE (overlay) ---------- */
  .note-overlay{
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at 50% 30%, var(--sky-soft), var(--sky-deep));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .note-overlay.open{
    opacity: 1;
    pointer-events: auto;
  }

  .note-card{
    background: #fff;
    border-radius: 26px;
    max-width: 480px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 52px 40px 40px;
    text-align: center;
    position: relative;
    box-shadow: 0 30px 80px rgba(20,50,70,0.45);
    transform: translateY(30px) scale(0.95);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(.2,.8,.2,1), opacity 0.6s ease;
  }
  .note-overlay.open .note-card{
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .note-heart{
    font-size: 2.4rem;
    display: inline-block;
    animation: beat 1.4s ease-in-out infinite;
    margin-bottom: 6px;
  }
  @keyframes beat{
    0%, 100%{ transform: scale(1); }
    25%{ transform: scale(1.18); }
    40%{ transform: scale(0.98); }
  }

  .note-label{
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sky-mid);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .note-text{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.5rem;
    line-height: 1.5;
    color: var(--ink);
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .note-actions{
    margin-top: 30px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-secondary, .btn-close{
    border: none;
    cursor: pointer;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 0.85rem;
  }
  .btn-secondary{
    background: var(--sky-pale);
    color: var(--sky-deep);
    transition: background 0.3s ease;
  }
  .btn-secondary:hover{ background: var(--sky-soft); }

  .btn-close{
    background: transparent;
    color: #98a9b3;
    text-decoration: underline;
  }

  footer{
    text-align: center;
    padding: 30px 20px 50px;
    font-size: 0.78rem;
    color: #5e8298;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 420px){
    .note-card{
      padding: 40px 24px 30px;
      border-radius: 20px;
    }
    .note-text{
      font-size: 1.25rem;
      min-height: 90px;
    }
    .note-actions{
      flex-direction: column;
      align-items: stretch;
    }
    .btn-secondary, .btn-close{
      width: 100%;
    }
    .slideshow{
      max-width: 100%;
      height: 190px;
    }
    .cta{
      padding: 15px 30px;
      font-size: 0.95rem;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<section class="hero">
  <div class="eyebrow">for the one who has my heart</div>
  <h1>The Love of My Life</h1>
  <p class="sub">Every quiet moment, every laugh, every ordinary Tuesday &mdash; somehow, it's all a little more beautiful with you in it.</p>

  <div class="heart-wrap">
    <button class="cta" id="openNote">Click to open the heart Mimi OWNS!💙</button>
  </div>
</section>

<h1><footer>made with my whole heart, just for you my baby💙</footer></h1>

<div class="note-overlay" id="noteOverlay">
  <div class="note-card">
    <div class="note-heart">💙</div>
    <div class="note-label">a little something</div>
    <div class="note-text" id="noteText"></div>

    <div class="slideshow" id="slideshow">
      <img src="1.jpeg" class="active" alt="A memory together">
      <img src="2.jpeg" alt="A memory together">
      <img src="3.jpeg" alt="A memory together">
      <img src="5.jpeg" alt="A memory together">
      <img src="6.jpeg" alt="A memory together">
      <img src="7.jpeg" alt="A memory together">
      <img src="8.jpeg" alt="A memory together">
      <img src="9.jpeg" alt="A memory together">
    </div>
    <div class="dots" id="dots"></div>

    <div class="note-actions">
      <button class="btn-secondary" id="anotherNote">change</button>
      <button class="btn-close" id="closeNote">close</button>
    </div>
  </div>
</div>

<script>
  // ---- Ambient bubbles ----
  const bubbleField = document.getElementById('bubbles');
  const bubbleCount = 16;
  for(let i=0; i<bubbleCount; i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 10 + Math.random()*40;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random()*100 + 'vw';
    b.style.animationDuration = (10 + Math.random()*14) + 's';
    b.style.animationDelay = (Math.random()*14) + 's';
    bubbleField.appendChild(b);
  }

  // ---- Slideshow ----
  const slides = document.querySelectorAll('#slideshow img');
  const dotsWrap = document.getElementById('dots');
  let current = 0;

  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  });
  const dots = document.querySelectorAll('.dot');

  function goTo(index){
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function nextSlide(){
    goTo((current + 1) % slides.length);
  }

  setInterval(nextSlide, 4200);

  // ---- Love note overlay ----
  const messages = [
    "You are my favorite hello and my hardest goodbye.",
    "If I had to choose a lifetime of silence or one word a day, I'd spend it saying your name.",
    "Home isn't a place. It's wherever you are.",
    "I fall for you a little more every single day, and I didn't think that was possible yesterday.",
    "You are the calm after every storm I've ever known.",
    "Some people search a lifetime for what I found in you.",
    "Every love song makes sense to me now.",
    "Everytime I think about you, I just can't wait for you to be called Mrs Thamagane",
    "You are my favorite reason to smile at my phone like an idiot.",
    "With you, even the boring days feel like something worth remembering.",
    "I didn't know what my heart was missing until you filled it.",
    "I love you baby!!"
  ];

  const overlay = document.getElementById('noteOverlay');
  const noteText = document.getElementById('noteText');
  const openBtn = document.getElementById('openNote');
  const anotherBtn = document.getElementById('anotherNote');
  const closeBtn = document.getElementById('closeNote');

  let lastIndex = -1;
  function randomMessage(){
    let idx;
    do{
      idx = Math.floor(Math.random() * messages.length);
    } while(idx === lastIndex && messages.length > 1);
    lastIndex = idx;
    return messages[idx];
  }

  function showNote(){
    noteText.style.opacity = 0;
    noteText.textContent = randomMessage();
    requestAnimationFrame(() => {
      noteText.style.transition = 'opacity 0.5s ease';
      noteText.style.opacity = 1;
    });
  }

  openBtn.addEventListener('click', () => {
    showNote();
    overlay.classList.add('open');
  });

  anotherBtn.addEventListener('click', showNote);

  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) overlay.classList.remove('open');
  });
</script>

</body>
</html>
